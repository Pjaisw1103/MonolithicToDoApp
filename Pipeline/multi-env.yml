trigger: none # Manual trigger only

pool: default

parameters:
  - name: environment
    displayName: Select Environment
    type: string
    default: dev
    values:
      - dev
      - qa
      - prod

variables:
  ${{ if eq(parameters.environment, 'dev') }}:
    workingDirectory: "$(System.DefaultWorkingDirectory)/Environment/dev"
    backendServiceArm: "Priya(803ytf07-hgu89-4a01-9b2c-19663d855b6fb6)"
    environmentServiceNameAzureRM: "Priya(803ytf07-hgu89-4a01-9b2c-19663d855b6fb6)"
  ${{ if eq(parameters.environment, 'qa') }}:
    workingDirectory: "$(System.DefaultWorkingDirectory)/Environment/qa"
    backendServiceArm: "Priya(803ytf07-hgu89-4a01-9b2c-19663d855b6fb6)" # Update if QA uses different service connection
    environmentServiceNameAzureRM: "Priya(803ytf07-hgu89-4a01-9b2c-19663d855b6fb6)" # Update if QA uses different service connection
  ${{ if eq(parameters.environment, 'prod') }}:
    workingDirectory: "$(System.DefaultWorkingDirectory)/Environment/prod"
    backendServiceArm: "Priya(803ytf07-hgu89-4a01-9b2c-19663d855b6fb6)" # Update if Prod uses different service connection
    environmentServiceNameAzureRM: "Priya(803ytf07-hgu89-4a01-9b2c-19663d855b6fb6)" # Update if Prod uses different service connection

stages:
  - stage: StaticAnalysisCode
    displayName: "Pre-Commit & Static Analysis: ${{ parameters.environment }}"
    jobs:
      - job: TerraformValidate
        displayName: Terraform Validate
        steps:
          - task: TerraformTask@5
            inputs:
              provider: "azurerm"
              command: "init"
              workingDirectory: $(workingDirectory)
              backendServiceArm: $(backendServiceArm)
          - task: TerraformTask@5
            inputs:
              provider: "azurerm"
              command: "validate"
              workingDirectory: $(workingDirectory)

      - job: TerraformFmt
        displayName: Terraform Fmt
        steps:
          - task: TerraformTask@5
            inputs:
              provider: "azurerm"
              command: "custom"
              workingDirectory: $(workingDirectory)
              outputTo: "console"
              customCommand: "terraform fmt"

      - job: TfSecScan
        displayName: Tfsec Scan
        steps:
          - task: tfsec@1
            inputs:
              version: "v1.26.0"
              dir: $(workingDirectory)

  - stage: Plan_Review
    displayName: "Plan & Review: ${{ parameters.environment }}"
    jobs:
      - job: Plan
        displayName: Terraform Plan
        steps:
          - task: TerraformTask@5
            inputs:
              provider: "azurerm"
              command: "init"
              workingDirectory: $(workingDirectory)
              backendServiceArm: $(backendServiceArm)
          - task: TerraformTask@5
            inputs:
              provider: "azurerm"
              command: "plan"
              workingDirectory: $(workingDirectory)
              environmentServiceNameAzureRM: $(environmentServiceNameAzureRM)

  - stage: ManualValidation
    displayName: Approve & Governance Stage
    jobs:
      - job: ManualValidation
        displayName: Manual Approval
        pool: server
        steps:
          - task: ManualValidation@1
            inputs:
              notifyUsers: "priyajaisw9554@gmail.com"
              approvers: "Priya"

  - stage: DeployStage
    displayName: "Deploy/Apply: ${{ parameters.environment }}"
    jobs:
      - job: Apply
        displayName: Terraform Apply
        steps:
          - task: TerraformTask@5
            inputs:
              provider: "azurerm"
              command: "init"
              workingDirectory: $(workingDirectory)
              backendServiceArm: $(backendServiceArm)

          - task: TerraformTask@5
            inputs:
              provider: "azurerm"
              command: "apply"
              workingDirectory: $(workingDirectory)
              environmentServiceNameAzureRM: $(environmentServiceNameAzureRM)
